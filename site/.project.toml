[package]
name = "site"

[package.scripts]
dev = "vinxi dev"
build = "tsc && vinxi build"
preview = "vinxi preview"

[package.dependencies]
"@fontsource/ibm-plex-mono" = "^5.2.7"
"@fontsource/schibsted-grotesk" = "^5.2.8"
unified = "^11.0.5"
remark-parse = "^11.0.0"
remark-gfm = "^4.0.1"
remark-rehype = "^11.1.2"
rehype-stringify = "^10.0.1"
rehype-slug = "^6.0.0"
shiki = "^4.0.2"

[package.devDependencies]
"@solidjs/meta" = "^0.29.4"
"@solidjs/router" = "^0.15.0"
"@solidjs/start" = "1.3.2"
solid-js = "^1.9.5"
solid-styled = "^0.12.1"
unplugin-solid-styled = "^0.12.1"
vinxi = "^0.5.7"

[tsconfig.compilerOptions]
target = "ESNext"
module = "ESNext"
moduleResolution = "bundler"
allowSyntheticDefaultImports = true
esModuleInterop = true
jsx = "preserve"
jsxImportSource = "solid-js"
allowJs = true
strict = true
noEmit = true
types = ["vinxi/types/client"]
isolatedModules = true
paths = { "~/*" = ["./src/*"] }

[tsconfig]
include = ["src"]
