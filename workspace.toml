projects = ["re", "ts-dep-analyze", "ts-hash", "pointsto", "site"]

[engines]
node = "22.20.0"
pnpm = "10.20.0"

[workspace]
name = "root"
version = "0.1.0"
type = "module"

[workspace.devDependencies]
tsx = "4.19.0"
typescript = "5.9.3"
"@types/node" = "22.15.29"
prettier = "3.4.0"
prettier-plugin-toml = "2.0.0"

[tsconfig.compilerOptions]
target = "esnext"
module = "nodenext"
moduleResolution = "nodenext"
strict = true
esModuleInterop = true
skipLibCheck = true

[pnpm]
minimumReleaseAge = 4320
minimumReleaseAgeExclude = ["solid-styled", "unplugin-solid-styled"]

[prettier]
plugins = ["prettier-plugin-toml"]

[vscode.settings]
"editor.formatOnSave" = true
"editor.defaultFormatter" = "esbenp.prettier-vscode"
