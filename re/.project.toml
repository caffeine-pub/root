[package]
name = "build-re"
version = "1.0.2"
public = true
files = ["dist"]

[package.bin]
re = "dist/cli.mjs"

[package.scripts]
build = "wasm-pack build --target web mutate-toml && node build.mjs"

[package.devDependencies]
smol-toml = "1.3.1"
chokidar = "4.0.0"
immer = "11.1.4"
esbuild = "0.27.4"

[tsconfig.compilerOptions]
outDir = "dist"
rootDir = "."
